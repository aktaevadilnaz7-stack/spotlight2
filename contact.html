<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | BlackPink Spotify</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap-grid.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">BP-SPOTIFY</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="artists.html">Artists</a></li>
                <li><a href="albums.html">Albums</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html" style="color: #ff4d8d;">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="container py-5">
        <div class="contact-form-container">
            <h2 class="text-center mb-4 text-pink">Request a Playlist</h2>
            <form id="contactForm">
                <div class="mb-3">
                    <label>Name</label>
                    <input type="text" id="name" class="form-control" placeholder="Your Name">
                    <small class="error-text" id="nameError">Name is required</small>
                </div>
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" id="email" class="form-control" placeholder="Email Address">
                    <small class="error-text" id="emailError">Please enter a valid email</small>
                </div>
                <div class="mb-3">
                    <label>Message</label>
                    <textarea id="message" class="form-control" rows="4" placeholder="Your request..."></textarea>
                    <small class="error-text" id="messageError">Min. 10 characters</small>
                </div>
                <button type="submit" class="btn-pink-full">Send Message</button>
            </form>
            <div id="successBox" class="text-center" style="display:none;">
                <h3 class="text-pink">Sent!</h3>
                <p>We'll get back to you soon.</p>
            </div>
        </div>
    </main>

    <footer><p>© 2026 Dilnaz DJ-2503 | Endterm Project</p></footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
